
services:
  postgres:
    image: postgres:18
    container_name: bookkeeply-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookkeeply_dev
      POSTGRES_USER: bookkeeply_dev
      POSTGRES_PASSWORD: dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookkeeply_dev -d bookkeeply_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: bookkeeply_postgres_data
