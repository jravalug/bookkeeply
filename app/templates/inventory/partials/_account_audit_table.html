<section class="bg-gray-50 py-8 dark:bg-gray-900">
  <div class="container mx-auto px-4">
    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4">
      Auditoria reciente de adopciones
    </h3>
    <div
      class="overflow-x-auto rounded-lg border border-gray-200 dark:border-gray-700"
    >
      <table class="w-full text-sm text-left text-gray-500 dark:text-gray-300">
        <thead class="bg-gray-100 dark:bg-gray-800 text-xs uppercase">
          <tr>
            <th class="py-3 px-4">Cuenta</th>
            <th class="py-3 px-4">Accion</th>
            <th class="py-3 px-4">Actor</th>
            <th class="py-3 px-4">Fecha</th>
          </tr>
        </thead>
        <tbody>
          {% for audit in audits %}
            <tr class="border-t border-gray-200 dark:border-gray-700">
              <td class="py-3 px-4">
                {{ audit.account.code }} - {{ audit.account.name }}
              </td>
              <td class="py-3 px-4">{{ audit.action }}</td>
              <td class="py-3 px-4">{{ audit.actor or '-' }}</td>
              <td class="py-3 px-4">{{ audit.created_at }}</td>
            </tr>
          {% else %}
            <tr>
              <td colspan="4" class="py-4 px-4 text-center">
                Sin eventos de auditoria
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
